@let data = displayData();

<div class="song-card"
     (click)="setActive()"
     [class.encore]="data.isEncore"
     [class.optional]="data.isOptional"
     [matContextMenuTriggerFor]="contextMenu.menu()!"
     title="Rechtsklick für weitere Optionen"
>
  @if (data.isEntry) {
    <div class="position">
      {{ data.position }}
    </div>
  }

  <div class="song-info">
    <span class="title">{{ data.title }}</span>
    <span class="subtitle">{{ data.subtitle }}</span>
  </div>

  <mat-chip-set class="song-meta" aria-label="Songs Meta Info">
    <mat-chip class="duration">
      <span class="mono-value">{{ data.duration | duration }}</span>
    </mat-chip>
    <mat-chip class="chip tempo">
      <span class="mono-value">{{ data.tempo | formatMonospace }}</span>
      <span class="unit">BPM</span>
    </mat-chip>
    <mat-chip class="chip key">
      <span class="mono-value">{{ data.key | formatMonospace:2 }}</span>
    </mat-chip>
    <mat-chip class="chip vox">
      <mat-icon matChipAvatar>mic</mat-icon>
      <span class="mono-value">{{ data.leadVocals | initials | formatMonospace:2 }}</span>
    </mat-chip>
    <span class="spacer"></span>
    <button mat-icon-button
            [matMenuTriggerFor]="contextMenu.menu()!"
            (click)="$event.stopPropagation()"
            type="button">
      <mat-icon>more_vert</mat-icon>
    </button>
  </mat-chip-set>

  <div class="song-actions">
  </div>
</div>

<app-setlist-context-menu #contextMenu [data]="data"></app-setlist-context-menu>
