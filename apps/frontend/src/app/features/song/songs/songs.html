@if (store.songsAreLoading()) {
  <mat-progress-bar mode="indeterminate"></mat-progress-bar>
}
<div class="song-list-container">
  <header class="list-header">
    <mat-form-field appearance="outline" class="filter-field">
      <mat-label>Suchen (Titel, Interpret, Sänger...)</mat-label>
      <input matInput #search
        placeholder="z.B. Bernd oder Hideaway...."
        (input)="applyFilter($event)"
        (keyup.escape)="clearSearch(search)" 
      />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
    <span class="spacer"></span>
    <button matFab extended class="add-song" routerLink="/songs/new" type="button">
      <mat-icon>add</mat-icon>
      Neuer Song
    </button>
  </header>


  <div class="table-responsive">
    <table mat-table [dataSource]="filteredSongs()" matSort class="mat-elevation-z2">

      <!-- Titel & Interpret -->
      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Song </th>
        <td mat-cell *matCellDef="let song">
          <div class="song-info">
            <span class="title">{{ song.title }}</span>
            <span class="artist">{{ song.artist }}</span>
          </div>
        </td>
      </ng-container>

      <!-- Tonart -->
      <ng-container matColumnDef="key">
        <th mat-header-cell *matHeaderCellDef> Tonart </th>
        <td mat-cell *matCellDef="let song"> {{ song.key }} </td>
      </ng-container>

      <!-- Tempo -->
      <ng-container matColumnDef="tempo">
        <th mat-header-cell *matHeaderCellDef> Tempo </th>
        <td mat-cell *matCellDef="let song">
          <div class="song-tempo">
            {{ song.tempo | formatMonospace }} BPM
          </div>
        </td>
      </ng-container>

      <!-- Gesang (Initialen-Pipe nutzen!) -->
      <ng-container matColumnDef="vocals">
        <th mat-header-cell *matHeaderCellDef> Sänger </th>
        <td mat-cell *matCellDef="let song">
          <div class="vocals">
            {{ song.leadVocals }}
          </div>
        </td>
      </ng-container>

      <!-- Datei-Ressourcen -->
      <ng-container matColumnDef="resources">
        <th mat-header-cell *matHeaderCellDef> Dateien </th>
        <td mat-cell *matCellDef="let song">
          <div class="song-files">
            {{ song.resources.length }}
          </div>
        </td>
      </ng-container>

      <!-- Aktionen -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let song">
          <mat-slide-toggle [checked]="song.isActive" (change)="store.toggleActive(song.id)" class="active">
            {{ song.isActive ? 'Aktiv' : 'Inaktiv' }}
          </mat-slide-toggle>
          <button matButton="outlined" [routerLink]="`${song.slug}`" type="button">
            <mat-icon>edit</mat-icon>
            <span class="action-hint">Bearbeiten</span>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>
</div>
