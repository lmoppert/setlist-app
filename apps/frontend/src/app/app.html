<mat-sidenav-container class="app-container">
  <mat-sidenav #sidenav mode="over" fixedBottomGap="true">
    <mat-nav-list (click)="sidenav.close()">
      <div class="menu-header">
        <img src="pontchartrain.svg" alt="Logo" class="logo" width="100%">
      </div>

      <mat-divider></mat-divider>

      <a mat-list-item routerLink="/setlists" class="link-button">
        <mat-icon matListItemIcon>format_list_bulleted</mat-icon>
        <span matListItemTitle>Setlisten-Übersicht</span>
      </a>

      <a mat-list-item routerLink="/songs" class="link-button">
        <mat-icon matListItemIcon>format_list_bulleted</mat-icon>
        <span matListItemTitle>Song-Übersicht</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar class="header">
      <button matIconButton aria-label="Seitenmenü umschalten" (click)="sidenav.toggle()" type="button">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="header-title">
        Band Manager -
        {{ titleService.title() }}
      </span>
      <span class="spacer"></span>
      <button matIconButton type="button" aria-label="Switch Themes" (click)="toggleTheme()"
              [matTooltip]="isDarkTheme() ? 'Switch to Light' : 'Switch to Dark'">
        <mat-icon>@if (isDarkTheme()) {light_mode} @else {dark_mode}</mat-icon>
      </button>
    </mat-toolbar>

    <main class="content">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
