services:
  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: setlist-api
    restart: always
    secrets:
      - database_url
      - jwt_secret
    environment:
      - NODE_ENV=production
      - PORT=3000
      - UPLOAD_DIR=/usr/src/app/uploads
    ports:
      - "127.0.0.1:3000:3000" # Nur lokal binden, Apache leitet von außen weiter
    extra_hosts:
      - "host.docker.internal:host-gateway" # Hilft, den Host-Postgres zu finden
    volumes:
      - /var/www/setlist/uploads:/usr/src/app/uploads
secrets:
  database_url:
    file: ./secrets/database_url.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
